
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="home">
    <h1>Hello, I'm likhith urs</h1>
    <img src="images/likhith.jpg" alt="My Photo" class="profile-pic">
    <p>Web Developer</p>
  </section>

  <section id="about">
    <h2>About Me</h2>
    <p>I am a student passionate about web development.</p>
  </section>

  <section id="skills">
    <h2>Skills</h2>
    <ul>
      <li>HTML, CSS, JavaScript</li>
      <li>Node.js</li>
      <li>MongoDB</li>
    </ul>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>
    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required class="contact">
      <input type="email" id="email" placeholder="Your Email" required class="contact">
      <textarea id="message" placeholder="Your Message" required class="contact"></textarea>
      <button type="submit">Send</button>
    </form>
    <p id="response"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
